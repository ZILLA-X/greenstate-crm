<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b2e1a">

<link rel="manifest" href="manifest.json">

<title>GreenState Client Registration</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#000;
  color:white;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
  background:#0b2e1a;
  padding:25px;
  border-radius:12px;
  border:1px solid #d4af37;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h1{
  color:#d4af37;
  text-align:center;
  margin-bottom:25px;
}

.section-title{
  margin-top:30px;
  margin-bottom:15px;
  color:#00c853;
  border-bottom:1px solid #145c32;
  padding-bottom:5px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.full{
  grid-column:1/3;
}

label{
  display:block;
  margin-bottom:6px;
  font-size:13px;
  color:#d4af37;
}

input,
select,
textarea{
  width:100%;
  padding:12px;
  border-radius:6px;
  background:#06150d;
  color:white;
  border:1px solid #145c32;
  box-sizing:border-box;
}

textarea{
  resize:none;
  min-height:100px;
}

input:focus,
select:focus,
textarea:focus{
  outline:none;
  border:1px solid #d4af37;
}

button{
  width:100%;
  padding:14px;
  margin-top:25px;
  background:#00c853;
  color:black;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#d4af37;
}

.back{
  display:block;
  text-align:center;
  margin-top:20px;
  color:#d4af37;
  text-decoration:none;
}

.upload-box{
  border:2px dashed #145c32;
  padding:20px;
  text-align:center;
  border-radius:8px;
  background:#06150d;
}

.success{
  margin-top:15px;
  text-align:center;
  color:#00c853;
  display:none;
}

@media(max-width:768px){
  .grid{ grid-template-columns:1fr; }
  .full{ grid-column:1; }
}

</style>
</head>

<body>

<div class="container">

<h1>Client Registration & Assessment</h1>

<form id="leadForm">

<!-- CLIENT INFORMATION -->
<h3 class="section-title">Client Information</h3>

<div class="grid">

<div>
<label>Business Name</label>
<input type="text" id="businessName" required>
</div>

<div>
<label>Owner / Contact Person</label>
<input type="text" id="contactPerson">
</div>

<div>
<label>Phone Number</label>
<input type="tel" id="phone" required>
</div>

<div>
<label>Email Address</label>
<input type="email" id="email">
</div>

<div class="full">
<label>Business Location</label>
<input type="text" id="location">
</div>

<div>
<label>Industry Type</label>
<select id="industry">
<option>Retail</option>
<option>Restaurant</option>
<option>Fashion</option>
<option>Corporate</option>
<option>School</option>
<option>Healthcare</option>
<option>Other</option>
</select>
</div>

<div>
<label>Assigned Staff</label>
<input type="text" id="assignedTo">
</div>

</div>

<!-- BUSINESS PROBLEMS -->
<h3 class="section-title">Business Problems Identified</h3>

<div class="grid">
<div class="full">
<textarea id="problems"></textarea>
</div>
</div>

<!-- SERVICES -->
<h3 class="section-title">Services Needed</h3>

<div class="grid">

<div>
<label>Primary Service</label>
<select id="service" required>
<option>CCTV Installation</option>
<option>Cybersecurity</option>
<option>Website Development</option>
<option>IT Support</option>
<option>Networking</option>
<option>Social Media Management</option>
</select>
</div>

<div>
<label>Priority Level</label>
<select id="priority">
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>
</div>

<div>
<label>Deal Stage</label>
<select id="dealStage">
<option>New Lead</option>
<option>Contacted</option>
<option>Meeting Scheduled</option>
<option>Proposal Sent</option>
<option>Negotiating</option>
<option>Closed Won</option>
<option>Closed Lost</option>
</select>
</div>

<div>
<label>Status</label>
<select id="status">
<option>New</option>
<option>Follow-up</option>
<option>Interested</option>
<option>Closed</option>
</select>
</div>

</div>

<!-- FOLLOW UP -->
<h3 class="section-title">Meeting & Follow-Up</h3>

<div class="grid">

<div>
<label>Next Follow-Up Date</label>
<input type="date" id="followupDate">
</div>

<div>
<label>Meeting Type</label>
<select id="meetingType">
<option>Physical Meeting</option>
<option>Phone Call</option>
<option>WhatsApp Chat</option>
<option>Video Meeting</option>
</select>
</div>

<div class="full">
<textarea id="meetingNotes"></textarea>
</div>

</div>

<!-- DOCUMENTS -->
<h3 class="section-title">Photos & Documents</h3>

<div class="upload-box">
<input type="file" id="documents" multiple>
</div>

<h3 class="section-title">Additional Notes</h3>
<textarea id="notes"></textarea>

<button type="submit">Save Client Record</button>

<div class="success" id="successMsg">
Client record saved successfully
</div>

</form>

<a class="back" href="dashboard.html">← Back to Dashboard</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDEogWvYWrOZpT1lScqRfM3o0MY2_DhSuM",
  authDomain: "greenstate-crm-8fc52.firebaseapp.com",
  databaseURL: "https://greenstate-crm-8fc52-default-rtdb.firebaseio.com",
  projectId: "greenstate-crm-8fc52",
  storageBucket: "greenstate-crm-8fc52.appspot.com",
  messagingSenderId: "777482605823",
  appId: "1:777482605823:web:dacce98855f0252cfce8ca"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("leadForm").addEventListener("submit", async (e) => {
  e.preventDefault(); // 🔥 FIX: prevents duplicate submissions

  const businessName = document.getElementById("businessName").value;
  const contactPerson = document.getElementById("contactPerson").value;
  const phone = document.getElementById("phone").value;
  const location = document.getElementById("location").value;
  const service = document.getElementById("service").value;
  const status = document.getElementById("status").value;
  const notes = document.getElementById("notes").value;

  if (!businessName || !phone || !service) {
    alert("Please fill required fields");
    return;
  }

  try {
    await addDoc(collection(db, "leads"), {
      businessName,
      contactPerson,
      phone,
      location,
      service,
      status,
      notes,
      assignedTo: "",
      createdAt: serverTimestamp()
    });

    document.getElementById("successMsg").style.display = "block";
    e.target.reset();

  } catch (error) {
    alert(error.message);
  }
});
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
