<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Profiles - GreenState CRM</title>

<style>

/* BASE */
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#050505,#0a0f0a);
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:#0f0f0f;
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.05);
}

.sidebar h2{
  color:#00c853;
  margin-bottom:25px;
}

.sidebar a{
  display:block;
  color:#d4af37;
  margin:12px 0;
  text-decoration:none;
  font-size:14px;
  padding:8px;
  border-radius:6px;
}

.sidebar a:hover{
  background:rgba(255,255,255,0.05);
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

h1{
  color:#00c853;
}

/* SEARCH */
input[type="text"]{
  width:100%;
  padding:12px;
  margin:15px 0;
  background:#000;
  border:1px solid #333;
  color:white;
  border-radius:8px;
}

/* CARD */
.card{
  background:#111;
  padding:15px;
  margin-bottom:12px;
  border-radius:12px;
  display:flex;
  align-items:center;
  gap:15px;
  border:1px solid rgba(255,255,255,0.05);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.01);
  border-color:#00c853;
}

/* PROFILE ICON */
.avatar{
  width:75px;
  height:75px;
  border-radius:50%;
  background:linear-gradient(135deg,#00c853,#145c32);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  font-weight:bold;
  color:black;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,200,83,0.3);
  border:2px solid rgba(255,255,255,0.1);
}

/* INFO */
.info h3{
  margin:0;
  color:#d4af37;
}

.info p{
  margin:2px 0;
  font-size:12px;
  color:#aaa;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#111;
  padding:20px;
  width:90%;
  max-width:380px;
  border-radius:12px;
  border:1px solid #00c853;
}

.modal-content h3{
  color:#00c853;
  margin-bottom:10px;
}

/* LABELS */
label{
  font-size:12px;
  color:#d4af37;
  display:block;
  margin-top:10px;
  margin-bottom:4px;
}

/* INPUTS */
.modal-content input{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  background:#000;
  border:1px solid #333;
  color:white;
  border-radius:8px;
}

/* BUTTONS */
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:8px;
  cursor:pointer;
  font-weight:bold;
}

.save{background:#00c853;color:black;}
.delete{background:#ff3b3b;color:white;}
.close{background:#d4af37;color:black;}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>GreenState</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="capture.html">Add Lead</a>
  <a href="followups.html">Follow-Ups</a>
  <a href="client.html">Clients</a>
</div>

<!-- MAIN -->
<div class="main">

<h1>Client Profiles</h1>

<input type="text" id="search" placeholder="Search client by name or phone...">

<div id="list"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

  <div class="modal-content">

    <h3>Edit Client</h3>

    <label>Business Name</label>
    <input id="m-name">

    <label>Phone Number</label>
    <input id="m-phone">

    <label>Service</label>
    <input id="m-service">

    <button class="save" onclick="saveClient()">Save Changes</button>
    <button class="delete" onclick="deleteClient()">Delete Client</button>
    <button class="close" onclick="closeModal()">Close</button>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDEogWvYWrOZpT1lScqRfM3o0MY2_DhSuM",
  authDomain: "greenstate-crm-8fc52.firebaseapp.com",
  projectId: "greenstate-crm-8fc52",
  storageBucket: "greenstate-crm-8fc52.appspot.com",
  messagingSenderId: "777482605823",
  appId: "1:777482605823:web:dacce98855f0252cfce8ca"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let clients = [];
let selectedId = null;

const list = document.getElementById("list");

/* LOAD REALTIME DATA */
onSnapshot(collection(db,"leads"), (snap)=>{
  clients = snap.docs.map(d => ({id:d.id, ...d.data()}));
  render(clients);
});

/* RENDER */
function render(data){

  list.innerHTML = "";

  data.forEach(c => {

    list.innerHTML += `
      <div class="card">

        <div class="avatar" onclick="window.location.href='profile.html?id=${c.id}'">
          ${c.businessName ? c.businessName.charAt(0).toUpperCase() : "?"}
        </div>

        <div class="info">
          <h3>${c.businessName || "No Name"}</h3>
          <p>${c.phone || ""}</p>
          <p>${c.service || ""}</p>
        </div>

      </div>
    `;
  });
}

/* OPEN CLIENT */
window.openClient = function(id){

  const c = clients.find(x => x.id === id);
  selectedId = id;

  document.getElementById("m-name").value = c.businessName || "";
  document.getElementById("m-phone").value = c.phone || "";
  document.getElementById("m-service").value = c.service || "";

  document.getElementById("modal").style.display = "flex";
}

/* CLOSE */
window.closeModal = function(){
  document.getElementById("modal").style.display = "none";
}

/* SAVE */
window.saveClient = async function(){

  await updateDoc(doc(db,"leads",selectedId),{
    businessName: document.getElementById("m-name").value,
    phone: document.getElementById("m-phone").value,
    service: document.getElementById("m-service").value
  });

  closeModal();
}

/* DELETE */
window.deleteClient = async function(){

  if(confirm("Delete this client?")){
    await deleteDoc(doc(db,"leads",selectedId));
    closeModal();
  }
}

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{

  const val = e.target.value.toLowerCase();

  render(clients.filter(c =>
    (c.businessName || "").toLowerCase().includes(val) ||
    (c.phone || "").toLowerCase().includes(val)
  ));

});

</script>

</body>
</html>
