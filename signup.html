<!DOCTYPE html>
<html lang="en">
<head>
  <!-- PWA CORE SETUP -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b2e1a">
<link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenState - Create Account</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .box {
      width: 350px;
      background: #0b0b0b;
      padding: 30px;
      border-radius: 12px;
      border: 1px solid #111;
      box-shadow: 0 0 25px rgba(0, 200, 83, 0.2);
    }

    h2 {
      text-align: center;
      color: #00c853;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      background: #111;
      color: white;
      outline: none;
    }

    input:focus {
      border: 1px solid #00c853;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #d4af37;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      color: black;
    }

    button:hover {
      background: #00c853;
      color: black;
    }

    .error {
      color: #ff4d4d;
      font-size: 13px;
      text-align: center;
      margin-bottom: 10px;
      min-height: 18px;
    }

    a {
      color: #d4af37;
      text-decoration: none;
      display: block;
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Create Account</h2>

    <div class="error" id="errorBox"></div>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password (min 6 chars)">

    <button onclick="signup()">Create Account</button>

    <a href="login.html">Already have an account? Login</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ✅ YOUR FIREBASE CONFIG (INSERTED)
    const firebaseConfig = {
      apiKey: "AIzaSyDEogWvYWrOZpT1lScqRfM3o0MY2_DhSuM",
      authDomain: "greenstate-crm-8fc52.firebaseapp.com",
      databaseURL: "https://greenstate-crm-8fc52-default-rtdb.firebaseio.com",
      projectId: "greenstate-crm-8fc52",
      storageBucket: "greenstate-crm-8fc52.firebasestorage.app",
      messagingSenderId: "777482605823",
      appId: "1:777482605823:web:dacce98855f0252cfce8ca"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const errorBox = document.getElementById("errorBox");

    window.signup = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (!email || !password) {
        errorBox.innerText = "Please fill all fields";
        return;
      }

      if (password.length < 6) {
        errorBox.innerText = "Password must be at least 6 characters";
        return;
      }

      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          alert("Account created successfully");
          window.location.href = "login.html";
        })
        .catch((error) => {
          errorBox.innerText = error.message;
        });
    };
    if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("Service Worker Registered"));
}
  </script>

</body>
</html>
