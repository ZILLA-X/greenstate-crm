<!DOCTYPE html>
<html lang="en">
<head>
  <!-- PWA CORE SETUP -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b2e1a">
<link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenState Outreach System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000000; /* BLACK */
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 520px;
      padding: 35px;
      background: #0b0b0b;
      border-radius: 14px;
      box-shadow: 0 0 25px rgba(0, 200, 83, 0.15);
      border: 1px solid #111;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 15px;
      color: #00c853; /* GREEN */
    }

    p {
      color: #cfcfcf;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    a {
      text-decoration: none;
    }

    button {
      padding: 12px 22px;
      background: #d4af37; /* GOLD */
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: #000;
      font-size: 14px;
      transition: 0.3s ease;
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
    }

    button:hover {
      background: #00c853; /* GREEN hover */
      color: #000;
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(0, 200, 83, 0.4);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }

    .accent-line {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #00c853, #d4af37);
      margin: 10px auto 20px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>GreenState Outreach System</h1>

    <div class="accent-line"></div>

    <p>
      Internal platform for managing outreach leads, client data, 
      and business interactions for GreenState operations.
    </p>

    <a href="login.html">
      <button>Staff Login</button>
    </a>

    <div class="footer">
      Secure Internal Access System
    </div>

  </div>
<script>
  if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("Service Worker Registered"));
}
</script>
</body>
</html>
